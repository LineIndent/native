name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Export Reflex frontend
        run: uv run reflex export --frontend-only

      - name: Create frontend directory
        run: mkdir frontend

      - name: Unzip frontend
        run: unzip -o frontend.zip -d frontend

      - name: Show frontend contents
        run: ls -la frontend
